<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="image-container">
            <img src="./images/img1.jpg" alt=""  id="content1" class="active">
            <img src="./images/img2.jpg" alt=""  id="content2">
            <img src="./images/img3.jpg" alt=""  id="content3">
            <img src="./images/img4.jpg" alt=""  id="content4">
            <img src="./images/img5.jpg" alt=""  id="content5">
            <img src="./images/img6.jpg" alt=""  id="content6">
            <img src="./images/img7.jpg" alt=""  id="content7">
            <img src="./images/img8.jpg" alt=""  id="content8">
            <img src="./images/img9.jpg" alt=""  id="content9">
            <img src="./images/img10.jpg" alt=""  id="condvtent10">
        </div>
        <div class="dot-container">
            <button onclick="dot(1)"></button>
            <button onclick="dot(2)"></button>
            <button onclick="dot(3)"></button>
            <button onclick="dot(4)"></button>
            <button onclick="dot(5)"></button>
            <button onclick="dot(6)"></button>
            <button onclick="dot(7)"></button>
            <button onclick="dot(8)"></button>
            <button onclick="dot(9)"></button>
            <button onclick="dot(10)"></button>
        </div>
        <button id="prev" onclick="prev()">&lt</button>
        <button id="next" onclick="next()">&gt</button>
    </div>
    <script src="./script.js"></script>
</body>
</html>
